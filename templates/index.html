<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список задач | TODO</title>
    <link rel="stylesheet" href="./static/style.css">
</head>
<body>
    <div class="container">
        <h1>📋 Список задач</h1>
        <div class="subtitle">Добавляйте задачи — они появятся в формате "номер - задача"</div>

        <!-- Форма добавления новой задачи -->
        <form id="taskForm" class="form-group">
            <input type="text" id="taskInput" name="user_input" placeholder="Введите текст задачи..." required autofocus>
            <button type="submit">➕ Добавить</button>
        </form>

        <!-- Секция со списком задач -->
        <div class="tasks-section">
            <div class="tasks-header">
                <span class="tasks-title">📌 Мои задачи</span>
                <span class="task-count" id="taskCounter">0 задач</span>
            </div>

            <!-- Список задач будет отображаться здесь -->
            <div id="taskListContainer">
                <div class="empty-tasks">
                    ✨ Пока нет задач<br>Добавьте первую задачу выше!
                </div>
            </div>

            <!-- Кнопки управления -->
            <div class="action-buttons">
                <button id="clearAllBtn" class="clear-btn" style="background:#f8f9fa;">🗑️ Очистить все</button>
            </div>
        </div>

        <!-- Сообщение для обратной связи -->
        <div id="messageBox" class="message" style="display: none;"></div>
    </div>


</body>
</html>
